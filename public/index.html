<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant Dashboard</title>
    <link rel="stylesheet" href="./style.css?v=20260606-1" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal Assistant</p>
          <h1>任務指揮中心</h1>
        </div>
        <div class="top-actions">
          <div class="sync-input">
            <input id="todo-list-name" value="提醒事項" aria-label="Todo list name" />
            <button id="sync-todo" class="primary" type="button">同步 Todo</button>
          </div>
          <div class="sync">
            <span class="pulse"></span>
            <span id="last-updated">同步中</span>
          </div>
        </div>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="panel focus-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Focus</p>
            <h2>今日先做</h2>
          </div>
        </div>
        <div class="focus-list" id="focus-list"></div>
      </section>

      <section class="grid">
        <section class="panel timeline-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Today</p>
              <h2>今日時間線</h2>
            </div>
            <button id="refresh" type="button">刷新</button>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Workload</p>
              <h2>狀態與重要性</h2>
            </div>
          </div>
          <div class="bars" id="status-bars"></div>
          <div class="energy" id="energy"></div>
        </section>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Matrix</p>
            <h2>四象限任務</h2>
          </div>
          <div class="task-actions">
            <button id="replan" type="button">重排</button>
            <button id="new-task" class="primary" type="button">新增</button>
          </div>
        </div>
        <div class="quadrant-grid" id="tasks"></div>
      </section>

      <section class="panel reminder-settings-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Secretary Mode</p>
            <h2>提醒設定</h2>
          </div>
          <button id="reset-reminder-settings" type="button">恢復預設</button>
        </div>
        <form id="reminder-settings-form" class="settings-grid">
          <label class="settings-card">
            提醒強度
            <select id="reminder-intensity">
              <option value="low">低</option>
              <option value="standard">標準</option>
              <option value="aggressive">積極</option>
            </select>
          </label>

          <label class="settings-card toggle-card">
            <input id="before-start-enabled" type="checkbox" />
            <span>開始前提醒</span>
            <small>用逗號輸入分鐘，例如 30, 10。</small>
            <input id="before-start-minutes" type="text" inputmode="numeric" />
          </label>

          <label class="settings-card toggle-card">
            <input id="start-enabled" type="checkbox" />
            <span>開始時提醒</span>
            <small>到時間要求你回覆 /start、/done 或 /snooze。</small>
            <label class="inline-check"><input id="start-require-response" type="checkbox" /> 要求回覆</label>
          </label>

          <label class="settings-card toggle-card">
            <input id="in-progress-enabled" type="checkbox" />
            <span>間歇追問</span>
            <small>任務進行中每隔多少分鐘確認一次。</small>
            <input id="in-progress-interval" type="number" min="5" max="240" step="5" />
          </label>

          <label class="settings-card toggle-card">
            <input id="end-enabled" type="checkbox" />
            <span>結束追問</span>
            <small>預計結束時問你是否完成。</small>
          </label>

          <label class="settings-card toggle-card">
            <input id="unanswered-enabled" type="checkbox" />
            <span>未回覆追問</span>
            <small>用逗號輸入累積分鐘，例如 10, 25, 55。</small>
            <input id="unanswered-minutes" type="text" inputmode="numeric" />
          </label>

          <label class="settings-card toggle-card">
            <input id="quiet-enabled" type="checkbox" />
            <span>夜間低打擾</span>
            <small>這段時間不做連續追問。</small>
            <div class="time-pair">
              <input id="quiet-start" type="time" />
              <input id="quiet-end" type="time" />
            </div>
          </label>

          <label class="settings-card toggle-card">
            <input id="high-priority-enabled" type="checkbox" />
            <span>高優先級加強</span>
            <small>priority 4-5 可多一個提前提醒。</small>
            <input id="high-priority-extra" type="text" inputmode="numeric" />
          </label>
        </form>
        <p class="settings-status" id="reminder-settings-status">提醒設定載入中</p>
      </section>
    </main>

    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <form id="task-form">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Editor</p>
            <h2 id="drawer-title">新增任務</h2>
          </div>
          <button id="close-drawer" type="button">關閉</button>
        </div>

        <input id="task-id" type="hidden" />

        <label>
          任務標題
          <input id="title" name="title" required maxlength="120" />
        </label>

        <div class="form-grid">
          <label>
            工時（分鐘）
            <input id="durationMinutes" name="durationMinutes" type="number" min="1" step="5" required />
          </label>
          <label>
            優先級
            <input id="priority" name="priority" type="number" min="1" max="5" required />
          </label>
        </div>

        <div class="form-grid">
          <label>
            工作類型
            <select id="task-energy" name="energy">
              <option value="high">專注工作</option>
              <option value="medium">一般工作</option>
              <option value="low">簡單行政</option>
            </select>
          </label>
          <label>
            狀態
            <select id="task-status" name="status">
              <option value="pending">待辦</option>
              <option value="in_progress">進行中</option>
              <option value="done">完成</option>
            </select>
          </label>
        </div>

        <label>
          最早開始
          <input id="earliestStart" name="earliestStart" type="datetime-local" />
        </label>

        <label>
          期限
          <input id="deadline" name="deadline" type="datetime-local" />
        </label>

        <label>
          情境
          <textarea id="context" name="context" rows="4"></textarea>
        </label>

        <p class="form-note" id="form-note">儲存後會自動重排未開始任務。</p>

        <div class="drawer-actions">
          <button id="cancel-edit" type="button">取消</button>
          <button class="primary" type="submit">儲存</button>
        </div>
      </form>
    </aside>

    <script src="./app.js?v=20260606-1" type="module"></script>
  </body>
</html>
